window.powerDetails = {};

od.reader.jsonp_batch_data = function(version, type, data) {
    if (type === "power") {
        Object.assign(powerDetails, data);
    }

    return originalBatchData.call(this, version, type, data);
};
</script>

<script>
    document.getElementById("powerName").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault(); // Prevent form submission if applicable
        generatePowerEntry();
    }
});

    function generatePowerEntry(){
        var powerName = document.getElementById("powerName").value

        //get power entry from database which contains the ID
        var powerEntry = getPowerObject(powerName)

        if(!powerEntry){
            document.getElementById("output").textContent = "Power could not be found"
            return
        }

        //Use the ID to retrieve the details
        var powerData = getPowerDetails(powerEntry[0])

        //Parse the details from HTML
        var power = parsePower(powerData)

        //Fill out roll20 Macro 
        var powerOutput = toRoll20Macro(power)

        //Output result
        document.getElementById("output").textContent = powerOutput
    }

    function getPowerObject(name) {
        const powers = window.powerIds

        const entry = powers.find(power =>
            power[1].toLowerCase() === name.toLowerCase()
        );
        return entry ? entry : null;
    }

    function getPowerDetails(id){
        return powerDetails[id];
    }

    function parsePower(powerHTML){
        const parser = new DOMParser();
        const doc = parser.parseFromString(powerHTML, "text/html");

        const powerStat = doc.querySelector("p.powerstat");
        const [header, footer] = powerStat.innerHTML.split("<br>");
        const footerDoc = new DOMParser().parseFromString(footer, "text/html");

        const specials = [...doc.querySelectorAll("p b")]
            .filter(b => b.textContent.trim() === "Special")
            .map(b =>
                b.parentElement.textContent
                    .replace("Special:", "")
                    .trim()
            );

        const action = footerDoc.querySelectorAll("b")[0].textContent
        const rangeLabel = footerDoc.querySelectorAll("b")[1];
        const range = `${rangeLabel.textContent} ${rangeLabel.nextSibling.textContent.trim()}`;

        const keywordDoc = new DOMParser().parseFromString(header, "text/html");
        const keywords = [...keywordDoc.querySelectorAll("b")]
            .slice(1)                // Skip the first (<b>At-Will</b>)
            .map(b => b.textContent)
            .join(", ");

        var primaryTarget = getField(doc, "Primary Target")
        var target = getField(doc, "Target")
        var targets = getField(doc, "Targets")
        var targetField = primaryTarget || target || targets

        var hits = []
        if(getField(doc, "Hit")){
            hits.push(getField(doc, "Hit"))
        }
        if(getField(doc, "Hit (Fortitude)")){
            hits.push("Hit (Fortitude): " + getField(doc, "Hit (Fortitude)"))
        }
        if(getField(doc, "Hit (Reflex)")){
            hits.push("Hit (Reflex): " + getField(doc, "Hit (Reflex)"))
        }
        if(getField(doc, "Hit (Will)")){
            hits.push("Hit (Will): " +getField(doc, "Hit (Will)"))
        }
        hits = hits.join("<br>")

        console.log(doc)

        const power = {
            name: doc.querySelector("h1").childNodes[0].textContent.trim(),
            level: doc.querySelector("h1 .level").textContent.trim(),
            flavor: doc.querySelector("p.flavor i")?.textContent.trim(),
            usage: header.match(/<b>(.*?)<\/b>/)[1],
            keywords: keywords,
            action: action,
            range: range,
            requirement: getField(doc, "Requirement"),
            target: targetField,
            attack: getField(doc, "Attack"),
            hit: hits.length > 0 ? hits : "",
            miss: getField(doc, "Miss"),
            effect: getField(doc, "Effect"),
            specials: specials,
            sustainMinor: getField(doc, "Sustain Minor"),
            sustainStandard: getField(doc, "Sustain Standard"),
            sustainMove: getField(doc, "Sustain Move"),
            secondaryTarget: getField(doc, "Secondary Target"),
            secondaryAttack: getField(doc, "Secondary Attack"),
            secondaryHit: getField(doc, "Hit", 1),
            secondaryEffect: getField(doc, "Effect", 1),
            tertiaryTarget: getField(doc, "Tertiary Target"),
            tertiaryAttack: getField(doc, "Tertiary Attack"),
            tertiaryHit: getField(doc, "Hit", 2),
            tertiaryEffect: getField(doc, "Effect", 2)
        }
        console.log(power)
        return power
    }
    function getField(doc, label, index = 0) {
        const matches = [...doc.querySelectorAll("p b")]
            .filter(b => b.textContent.trim() === label);

        const bold = matches[index];
        if (!bold) return null;

        return bold.parentElement.textContent
            .replace(label + ":", "")
            .trim();
    }

/*
    function getField(doc, label) {
        const bold = [...doc.querySelectorAll("p b")]
            .find(b => b.textContent.trim() === label);

        if (!bold) return null;

        return bold.parentElement.textContent
            .replace(label + ":", "")
            .trim();
    }*/

    function toRoll20Macro(power) {
        weaponOverride = document.getElementById("equippedWeapon").value > 0
        weaponChoice = weaponOverride ? "weapon-"+document.getElementById("equippedWeapon").value : "power-"+document.getElementById("powerNumber").value;

        weaponAttack = weaponChoice +"-attack-misc"
        weaponDamage = weaponChoice +"-damage-misc"
        weaponDice = weaponOverride ? weaponChoice+"-dice" : weaponChoice+"-weapon-dice"
        weaponNumDice = weaponOverride ? weaponChoice+"-num-dice" : weaponChoice+"-weapon-num-dice" 

        let macro = "&{template:dnd4epower}";
        addField(power.usage.toLowerCase().replace("-", "").replace("(special)", "").trim(), "1");
        addField("name", power.name);
        addField("emote", power.flavor);
        addField("level", power.level); 
        addField("type", power.usage);
        addField("keywords", power.keywords);
        addField("action", power.action);
        addField("range", "♦ "+power.range);
        addField("target", power.target);

        var attackString
        if(power.attack){
            attackString = getAttack(power.attack, power?.hit?.includes("[W]"))
            addField("attack", attackString); 
        }

        if(power.hit){
            var damageString = getDamage(power.hit)
            addField("damage", damageString); 

            var hitEffectString = getHitEffectString(power.hit)
            addField("hiteffect", hitEffectString);

            var critString = getDamage(power.hit, true)
            addField("critical", critString); 

            //Add Multiattack
            if(power?.attack?.includes("two attacks") || power?.attack?.includes("attack twice")){
                addField("secondaryattack", attackString); 
                addField("secondarydamage", damageString); 
                addField("secondarycritical", critString); 
                addField("secondaryhiteffect", hitEffectString);
            } else if (power?.attack?.includes("three attacks") || power?.attack?.includes("attack a third time")){
                addField("tertiaryattack", attackString); 
                addField("tertiarycritical", critString);
                addField("tertiaryhiteffect", hitEffectString); 
                addField("tertiarydamage", damageString); 
            }
        }


        addField("secondaryattack", power.secondaryAttack ? getAttack(power.secondaryAttack, power.secondaryHit?.includes("[W]")): ""); 
        addField("secondarydamage", power.secondaryHit ? getDamage(power.secondaryHit) : ""); 
        addField("secondarycritical", power.secondaryHit ? getDamage(power.secondaryHit, true) : ""); 
        addField("secondaryhiteffect", power.secondaryHit ? getHitEffectString(power.secondaryHit) : "");

        addField("tertiaryattack", power.tertiaryAttack ? getAttack(power.tertiaryAttack, power.tertiaryHit?.includes("[W]")): ""); 
        addField("tertiarydamage", power.tertiaryHit ? getDamage(power.tertiaryHit) : ""); 
        addField("tertiarycritical", power.tertiaryHit ? getDamage(power.tertiaryHit, true) : ""); 
        addField("tertiaryhiteffect", power.tertiaryHit ? getHitEffectString(power.tertiaryHit) : "");
        
        addField("miss", power.miss);
        addField("effect", addModifiersAndDice(power?.effect)); 
        
        specials = power?.specials.join("<br>")
        var specialRoll = ""
        if(specials?.includes("modifier")){
            modifier = specials.match(/(\w+)\s+modifier/)?.[1] ?? "";
            specialRoll = " [[@{"+modifier+"-mod}]]"
        }   
        addField("special", specials.replace(/\b\d+d\d+\b/g, "[[$&]]")+specialRoll);
        addField("requirement", power?.requirement);
        addField("sustainminor", power?.sustainMinor)
        addField("sustainstandard", power?.sustainStandard)
        addField("sustainmove", power?.sustainMove)

        return macro

        function addField(name, value) {
            if (value && value?.trim()) {
                macro += `{{${name}=${value}}}`;
            }
        }

        function getAttack(input, weaponPower){
            attackparts = input?.split(" ")
            if(attackparts == undefined){
                return
            }
            attackmod = attackparts[0]?.toLowerCase()+"-mod"
            defense = input?.match(/\bvs\.\s+(\w+)/i)?.[1] ?? "";
            extras = input?.match(/\+\s*(.*?)\s*vs\./i)?.[1] ?? "";
            if(extras.length > 0){
                extras = "+"+extras
            }

            var attackString
            if(weaponPower){
                attackString = "[[ 1d20 + [[ @{"+attackmod+"}]]"+extras+"+@{"+weaponAttack+"}]] vs **"+defense+"**"
            } else {
                attackString = "[[ 1d20 + [[ @{"+attackmod+"}]]"+extras+"]] vs **"+defense+"**"
            }
            return attackString
        }

        function getDamage(input, crit = false){
            if(input?.includes("[W]")){
                var damageroll, damagemod, damagetype, critdamage

                dicenum = input?.split("[W]")[0]
                damageroll = "[[@{"+weaponNumDice+"}*"+dicenum+"]]"+input?.split(" ")[0].split("[W]")[1]+ "d@{"+weaponDice+"}"
                damagetype = ""
                critdamage = damageroll.split("d@")[0]+"* @{"+weaponDice+"}"

                //Some powers add modifiers to damage
                if(input?.includes("modifier")){
                    const ability = input?.match(/(\w+)\s+modifier/)?.[1] ?? "";
                    damagemod = "+[[ @{"+ability.toLowerCase()+"-mod}]]+@{"+weaponDamage+"}]]"
                } else {
                    damagemod = "+@{"+weaponDamage+"}]]"
                }
            } else {
                damageroll = input?.split(" ")[0]
                damagemod = "+ [[@{" + input?.split(" ")[2].toLowerCase()+"-mod"+"}]]]] "
                damagetype = input?.match(/modifier\s+(.*?)\s+damage/)?.[1] ?? "";
                critdamage = damageroll?.split("d")[0]*damageroll?.split("d")[1]
            }

            var damageString 
            if(crit == false){
                damageString = "[["+damageroll + damagemod + damagetype +" damage"
            } else {
                damageString = "[["+critdamage + damagemod + damagetype +" damage"
            }
            return damageString
        }

        function getHitEffectString(input) {
            if(input){
                var effectString = (((input?.replace(input?.split("damage")[0]+"damage", "")).replace(/^[^\w\s]/, "")).trim().replace(/^and\s+/i, "")).trim()
                effectString = effectString.charAt(0).toUpperCase() + effectString.slice(1);
                effectString = effectString.replace("(melee) or 1[W] + Dexterity modifier damage (ranged). ", "")
                return effectString
            }
        }

        function addModifiersAndDice(input) {
            var effectRoll = ""
            if(input?.includes("modifier")){
                modifier = input?.match(/(\w+)\s+modifier/)?.[1] ?? "";
                effectRoll = " [[@{"+modifier+"-mod}]]"
                input = input + effectRoll
            }   
            if(input){
                input = input?.replace(/\b\d+d\d+\b/g, "[[$&]]");
            } 
            return input
        }
    }

</script>
